---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: can-mysql-stable
  namespace: tools-argocd
spec:
  project: canaries
  sources:
    - repoURL: https://github.com/pkudikyala/database-coreint-canaries.git
      targetRevision: main
      ref: repo
    - path: canaries/mysql
      repoURL: https://github.com/pkudikyala/database-coreint-canaries.git
      targetRevision: main
      helm:
        releaseName: mysql-stable
        valueFiles:
          - $repo/common/otel-collector-values.yaml
          - otel-collector-values.yaml
          - values.yaml
          - $repo/common/values-stable.yaml
  destination:
    namespace: can-mysql-stable
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
