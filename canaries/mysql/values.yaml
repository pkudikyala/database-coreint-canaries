
# Default values for mysql.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
nodeSelector:
  role: default

replicaCount: 1

client:
  podLabels:
    environment: unknown
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 50Mi
    requests:
      cpu: 100m
      memory: 10Mi
  script: |
    function execute() { mysql -u root -h{{ include "mysql.fullname" .  }} -p${MYSQL_ROOT_PASSWORD} sample_database -e "$@"; }
    MAX_KEYS=10000
    function key() { KEY=$((RANDOM % $MAX_KEYS)); }
    while true; do
      key
      execute "insert into sample_table values (${KEY});" > /dev/null
      key
      execute "select * from sample_table limit ${KEY};" > /dev/null
      key
      execute "delete from sample_table where id=${KEY};" > /dev/null
      sleep $((RANDOM % 2))
    done

rootPassword: test-password

image:
  # library/mysql does not support ARM64.
  repository: mysql/mysql-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources:
  limits:
    cpu: 300m
    memory: 1.2G
  requests:
    cpu: 150m
    memory: 900Mi

# nodeSelector: {}

tolerations: []

affinity: {}
